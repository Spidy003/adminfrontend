name: Vercel Deploy

on:
  push:
    branches:
      - main  # This will trigger deployment whenever you push to 'main'
  
jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOCKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USERID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECTID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOCKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USERID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECTID }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOCKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USERID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECTID }}
